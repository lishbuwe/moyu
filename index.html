<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e12">
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" href="logo.png">
<title>墨游</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0e12;--bg2:#14141c;--bg3:#1c1c28;
  --border:#282838;--bord2:#38384a;
  --text:#e2d9cc;--text2:#8c8298;--text3:#4e4858;
  --gold:#c4a050;--gold2:#deb86e;--red:#c45858;--green:#58a878;
  --tab-h:56px;--safe-b:env(safe-area-inset-bottom,0px);--hdr-h:50px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* PAGES */
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 16px)}
.page.active{display:flex;flex-direction:column}
#page-game{padding-bottom:0}

/* TAB BAR */
#tab-bar{height:calc(var(--tab-h) + var(--safe-b));background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:4px;flex-shrink:0;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;opacity:.4;transition:opacity .2s}
.tab.active{opacity:1}
.tab-icon{font-size:20px;line-height:1}
.tab-label{font-size:10px;font-family:'Noto Sans SC',sans-serif;color:var(--text2);letter-spacing:.5px}
.tab.active .tab-label{color:var(--gold)}

/* HEADERS */
.page-header{padding:20px 20px 12px;display:flex;align-items:baseline;justify-content:space-between}
.page-title{font-size:22px;font-weight:600;letter-spacing:2px}
.page-subtitle{font-size:12px;color:var(--text3);font-family:'Noto Sans SC',sans-serif}
.section-title{font-size:11px;letter-spacing:3px;color:var(--text3);font-family:'Noto Sans SC',sans-serif;padding:16px 0 10px;border-bottom:1px solid var(--border);margin-bottom:14px}

/* HISTORY */
.new-game-btn{display:flex;align-items:center;gap:8px;margin:0 20px 20px;padding:14px 20px;background:linear-gradient(135deg,#1a1a26,#222232);border:1px dashed var(--bord2);border-radius:12px;cursor:pointer;color:var(--gold);font-family:'Noto Serif SC',serif;font-size:14px;letter-spacing:1px}
.new-game-btn:active{background:var(--bg3)}
.game-list{padding:0 20px;display:flex;flex-direction:column;gap:12px}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:0;position:relative}
.game-card-body{flex:1;min-width:0;cursor:pointer;display:flex;align-items:center;gap:14px}
.game-emoji{font-size:28px;flex-shrink:0}
.game-info{flex:1;min-width:0}
.game-name{font-size:15px;font-weight:500;letter-spacing:1px;margin-bottom:4px}
.game-meta{font-size:11px;color:var(--text3);font-family:'Noto Sans SC',sans-serif;margin-bottom:6px}
.game-tags{display:flex;flex-wrap:wrap;gap:4px}
.game-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text2);font-family:'Noto Sans SC',sans-serif}
.game-del-btn{padding:10px 8px;color:var(--text3);cursor:pointer;font-size:17px;flex-shrink:0}
.game-del-btn:active{color:var(--red)}

/* GAME PAGE */
#game-header{height:var(--hdr-h);display:flex;align-items:center;padding:0 16px;gap:8px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
#game-world-name{font-size:13px;color:var(--text2);letter-spacing:2px;font-family:'Noto Sans SC',sans-serif;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#game-chapter{font-size:12px;color:var(--gold);font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
#game-settings-btn{padding:8px 4px;color:var(--text3);cursor:pointer;font-size:19px;flex-shrink:0}
#game-settings-btn:active{color:var(--gold)}

#narrative-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 20px 12px;display:flex;flex-direction:column;gap:14px}
.narrative-block{animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.narrative-text{font-size:15px;line-height:2;letter-spacing:.5px;color:var(--text);text-indent:2em}
.narrative-action{font-size:13px;color:var(--text2);font-style:italic;text-align:right;font-family:'Noto Sans SC',sans-serif;border-right:2px solid var(--gold);padding-right:10px}
.check-result{background:var(--bg2);border-radius:8px;padding:12px 14px;border-left:3px solid var(--bord2)}
.check-result.success{border-left-color:var(--green)}
.check-result.fail{border-left-color:var(--red)}
.check-label{font-size:11px;font-family:'Noto Sans SC',sans-serif;margin-bottom:6px;color:var(--text2)}
.check-label.success{color:var(--green)}
.check-label.fail{color:var(--red)}
.stat-log{display:flex;flex-wrap:wrap;gap:5px;padding:4px 0}
.stat-chip{font-size:10px;font-family:'Noto Sans SC',sans-serif;padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.stat-chip.up{color:var(--green);border-color:rgba(88,168,120,.3);background:rgba(88,168,120,.06)}
.stat-chip.down{color:var(--red);border-color:rgba(196,88,88,.3);background:rgba(196,88,88,.06)}
.stat-chip.tag-add{color:var(--gold);border-color:rgba(196,160,80,.3);background:rgba(196,160,80,.06)}
.stat-chip.tag-rm{color:var(--text3);border-color:var(--border)}

/* DICE */
.check-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;animation:fadeUp .2s ease}
.dice-wrap{display:flex;flex-direction:column;align-items:center;gap:24px}
.dice{width:88px;height:88px;border:2px solid var(--gold);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:40px;animation:diceRoll .55s ease;background:var(--bg2);box-shadow:0 0 30px rgba(196,160,80,.2)}
@keyframes diceRoll{0%{transform:rotate(0) scale(.4);opacity:0}60%{transform:rotate(200deg) scale(1.15)}100%{transform:rotate(360deg) scale(1);opacity:1}}
.check-info{text-align:center;font-family:'Noto Sans SC',sans-serif}
.ci-stat{font-size:13px;color:var(--text2);margin-bottom:6px}
.ci-score{font-size:38px;font-weight:700;letter-spacing:2px}
.ci-score.success{color:var(--green)}
.ci-score.fail{color:var(--red)}
.ci-vs{font-size:12px;color:var(--text3);margin-top:4px}
.ci-verdict{font-size:20px;margin-top:14px;font-weight:600;letter-spacing:5px}
.ci-verdict.success{color:var(--green)}
.ci-verdict.fail{color:var(--red)}

/* OPTIONS */
#option-area{padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;padding-bottom:calc(12px + var(--safe-b));flex-shrink:0}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.option-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Noto Serif SC',serif;font-size:13px;line-height:1.5;cursor:pointer;text-align:left;transition:all .15s;letter-spacing:.3px;width:100%}
.option-btn:active{background:var(--bg3);border-color:var(--gold);color:var(--gold2)}
.free-input-row{display:flex;gap:8px}
#free-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Noto Serif SC',serif;font-size:16px;outline:none;-webkit-appearance:none;resize:none;min-height:42px;max-height:100px}
#free-input:focus{border-color:var(--bord2)}
#free-input::placeholder{color:var(--text3)}
#send-btn{background:var(--bg3);border:1px solid var(--bord2);border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gold);font-size:18px;flex-shrink:0}
#send-btn:active{background:var(--border)}

/* LOADING */
.loading-dots{display:flex;align-items:center;gap:5px;padding:16px 0}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:dotBounce 1.2s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* CHARACTER */
.char-section{padding:0 20px 16px}
.npc-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.npc-header{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.npc-name{font-size:16px;font-weight:500;letter-spacing:1px}
.npc-desc{font-size:12px;color:var(--text2);font-family:'Noto Sans SC',sans-serif;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.affection-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.aff-label{font-size:11px;color:var(--text3);font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
.aff-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.aff-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--gold),var(--gold2));transition:width .5s}
.aff-num{font-size:12px;color:var(--gold);font-family:'Noto Sans SC',sans-serif}
.event-tags{display:flex;flex-wrap:wrap;gap:4px}
.event-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text3);font-family:'Noto Sans SC',sans-serif}
.player-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.player-name-row{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.player-name{font-size:18px;font-weight:500;letter-spacing:2px}
.player-bg-text{font-size:12px;color:var(--text2);font-family:'Noto Sans SC',sans-serif}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-item{display:flex;flex-direction:column;gap:4px}
.s-name{font-size:11px;color:var(--text3);font-family:'Noto Sans SC',sans-serif;letter-spacing:1px}
.s-bar-row{display:flex;align-items:center;gap:6px}
.s-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.s-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .5s}
.s-val{font-size:13px;color:var(--text);font-family:'Noto Sans SC',sans-serif}
.player-tags{display:flex;flex-wrap:wrap;gap:5px}
.p-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(196,160,80,.1);border:1px solid rgba(196,160,80,.3);color:var(--gold);font-family:'Noto Sans SC',sans-serif}

/* FRAGMENT */
.frag-toolbar{padding:0 20px 12px;display:flex;align-items:center;gap:8px;overflow-x:auto}
.frag-toolbar::-webkit-scrollbar{display:none}
.frag-filter{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans SC',sans-serif;font-size:12px;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.frag-filter.active{background:var(--bg3);border-color:var(--gold);color:var(--gold)}
.gen-frag-btn{display:flex;align-items:center;gap:6px;margin:0 20px 14px;padding:12px 16px;background:linear-gradient(135deg,rgba(196,160,80,.1),rgba(196,160,80,.05));border:1px solid rgba(196,160,80,.3);border-radius:10px;cursor:pointer;color:var(--gold);font-family:'Noto Sans SC',sans-serif;font-size:13px;letter-spacing:1px}
.gen-frag-btn:active{background:rgba(196,160,80,.15)}
.fragment-list{padding:0 20px;display:flex;flex-direction:column;gap:12px}
.fragment-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.frag-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.frag-meta{display:flex;align-items:center;gap:8px}
.frag-npc{font-size:13px;font-weight:500;letter-spacing:1px}
.frag-type-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text3);font-family:'Noto Sans SC',sans-serif}
.frag-chapter-ref{font-size:11px;color:var(--text3);font-family:'Noto Sans SC',sans-serif}
.frag-content{padding:14px;font-size:13px;line-height:1.9;color:var(--text2);letter-spacing:.3px;white-space:pre-line}

/* SETTINGS */
.settings-section{padding:0 20px 20px}
.setting-item{padding:14px 0;border-bottom:1px solid var(--border)}
.setting-item:last-child{border-bottom:none}
.setting-label{font-size:12px;color:var(--text3);font-family:'Noto Sans SC',sans-serif;letter-spacing:1px;margin-bottom:8px}
.provider-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.provider-btn{padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-family:'Noto Sans SC',sans-serif;font-size:12px;text-align:center;cursor:pointer;transition:all .15s}
.provider-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(196,160,80,.08)}
.setting-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:16px;outline:none;-webkit-appearance:none}
.setting-input:focus{border-color:var(--bord2)}
.model-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;appearance:none}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;flex-direction:column;justify-content:flex-end;z-index:500;animation:fadeUp .2s ease}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-b))}
.modal-handle{width:36px;height:4px;background:var(--bord2);border-radius:2px;margin:12px auto 16px}
.modal-title{font-size:17px;font-weight:500;letter-spacing:2px;padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:0}
.modal-body{padding:0 20px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;color:var(--text3);letter-spacing:2px;font-family:'Noto Sans SC',sans-serif;margin-bottom:8px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Noto Serif SC',serif;font-size:16px;outline:none;-webkit-appearance:none}
.form-input:focus{border-color:var(--bord2)}
.form-textarea{resize:none;min-height:80px;line-height:1.7}
.hint-text{font-size:11px;color:var(--text3);font-family:'Noto Sans SC',sans-serif;margin-top:6px;line-height:1.6}
.stats-builder{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.stat-row{display:flex;gap:8px;align-items:center}
.rm-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:16px;flex-shrink:0}
.add-btn{padding:8px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-family:'Noto Sans SC',sans-serif;font-size:12px;cursor:pointer;text-align:center;width:100%}
.import-btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Noto Sans SC',sans-serif;font-size:12px;cursor:pointer;text-align:center}
.import-btn:active{background:var(--border)}
.npc-builder{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.npc-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.npc-item-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.npc-item-name{font-size:14px;letter-spacing:1px}
.wizard-steps{display:flex;gap:6px;padding:0 20px 16px;justify-content:center}
.wz-step{width:24px;height:3px;border-radius:2px;background:var(--bord2);transition:background .3s}
.wz-step.done{background:var(--gold)}
.wizard-nav{display:flex;gap:8px;padding:16px 0 0}
.btn-secondary{flex:1;padding:13px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer;text-align:center}
.btn-primary{flex:2;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#c4a050,#deb86e);color:#0e0e12;font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px;text-align:center}
.btn-danger{flex:1;padding:13px;border-radius:10px;border:1px solid var(--red);background:transparent;color:var(--red);font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer;text-align:center}

/* GAME SETTINGS TABS */
.modal-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:0}
.mtab{flex:1;padding:12px 0;text-align:center;font-size:12px;font-family:'Noto Sans SC',sans-serif;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.gset-section{padding:16px 20px}

/* STYLE CONTROLS */
.style-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.style-row:last-child{border-bottom:none}
.style-lbl{font-size:13px;color:var(--text);font-family:'Noto Sans SC',sans-serif}
.style-hint{font-size:10px;color:var(--text3);font-family:'Noto Sans SC',sans-serif;margin-top:2px}
.style-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:12px;outline:none;-webkit-appearance:none;appearance:none}
.toggle-wrap{width:44px;height:24px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-wrap.on{background:var(--gold);border-color:var(--gold)}
.toggle-wrap::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s}
.toggle-wrap.on::after{left:22px}
.range-wrap{display:flex;align-items:center;gap:8px}
.style-range{-webkit-appearance:none;appearance:none;width:100px;height:4px;border-radius:2px;background:var(--bg3);outline:none}
.style-range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:8px;background:var(--gold);cursor:pointer}
.range-val{font-size:12px;color:var(--gold);font-family:'Noto Sans SC',sans-serif;width:12px;text-align:center}

/* FRAG GEN */
.frag-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.frag-type-btn{padding:12px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Noto Serif SC',serif;font-size:13px;text-align:center;cursor:pointer;transition:all .15s}
.frag-type-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(196,160,80,.08)}
.npc-sel-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.npc-sel-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Serif SC',serif;font-size:13px;cursor:pointer;transition:all .15s}
.npc-sel-btn.active{border-color:var(--gold);color:var(--gold)}

/* UTILS */
.empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-family:'Noto Sans SC',sans-serif;font-size:13px;line-height:2}
.empty-icon{font-size:32px;margin-bottom:10px}
.toast{position:fixed;top:calc(20px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bord2);border-radius:8px;padding:10px 20px;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--text);z-index:9999;white-space:nowrap;animation:toastIn .3s ease, toastOut .3s ease 2s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
*::-webkit-scrollbar{display:none}
*{scrollbar-width:none}

<body>
<div id="app">

  <!-- HISTORY -->
  <div id="page-history" class="page active">
    <div class="page-header">
      <span class="page-title">墨游</span>
      <span class="page-subtitle" id="hist-sub">0 个故事</span>
    </div>
    <div class="new-game-btn" onclick="openWizard()"><span>＋</span><span>开始新的故事</span></div>
    <div class="game-list" id="game-list"></div>
  </div>

  <!-- GAME -->
  <div id="page-game" class="page">
    <div id="game-header">
      <span id="game-world-name">—</span>
      <span id="game-chapter">序章</span>
      <span id="game-settings-btn" onclick="openGameSettings()">⚙</span>
    </div>
    <div id="narrative-area">
      <div class="empty-state"><div class="empty-icon">📖</div>故事从这里开始……</div>
    </div>
    <div id="option-area">
      <div class="options-grid" id="options-grid"></div>
      <div class="free-input-row">
        <textarea id="free-input" placeholder="自由行动……" rows="1"></textarea>
        <div id="send-btn" onclick="sendFreeInput()">↑</div>
      </div>
    </div>
  </div>

  <!-- CHARACTER -->
  <div id="page-character" class="page">
    <div class="page-header"><span class="page-title">角色</span></div>
    <div class="char-section">
      <div class="section-title">我的状态</div>
      <div id="player-panel"></div>
      <div class="section-title">登场人物</div>
      <div id="npc-list"></div>
    </div>
  </div>

  <!-- FRAGMENT -->
  <div id="page-fragment" class="page">
    <div class="page-header"><span class="page-title">碎片集</span></div>
    <div class="gen-frag-btn" onclick="openFragGen()">✦ 生成新碎片</div>
    <div class="frag-toolbar" id="frag-filters"></div>
    <div class="fragment-list" id="fragment-list"></div>
  </div>

  <!-- SETTINGS -->
  <div id="page-settings" class="page">
    <div class="page-header"><span class="page-title">设置</span></div>
    <div class="settings-section">
      <div class="section-title">AI 服务商</div>
      <div class="setting-item">
        <div class="provider-grid" id="provider-grid">
          <div class="provider-btn active" data-p="deepseek" onclick="selectProvider('deepseek')">DeepSeek</div>
          <div class="provider-btn" data-p="claude" onclick="selectProvider('claude')">Claude</div>
          <div class="provider-btn" data-p="openai" onclick="selectProvider('openai')">GPT</div>
          <div class="provider-btn" data-p="gemini" onclick="selectProvider('gemini')">Gemini</div>
        </div>
      </div>
      <div class="setting-item">
        <div class="setting-label">API KEY</div>
        <input class="setting-input" type="password" id="api-key-input" placeholder="输入 API Key" onchange="saveApiKey()">
        <div class="hint-text" id="key-hint"></div>
      </div>
      <div class="setting-item">
        <div class="setting-label">模型</div>
        <select class="model-select" id="model-select" onchange="saveModel()"></select>
      </div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div id="tab-bar">
    <div class="tab active" onclick="switchTab('history')" data-tab="history"><span class="tab-icon">📚</span><span class="tab-label">故事</span></div>
    <div class="tab" onclick="switchTab('game')" data-tab="game"><span class="tab-icon">📖</span><span class="tab-label">游玩</span></div>
    <div class="tab" onclick="switchTab('character')" data-tab="character"><span class="tab-icon">👤</span><span class="tab-label">角色</span></div>
    <div class="tab" onclick="switchTab('fragment')" data-tab="fragment"><span class="tab-icon">🎴</span><span class="tab-label">碎片集</span></div>
    <div class="tab" onclick="switchTab('settings')" data-tab="settings"><span class="tab-icon">⚙️</span><span class="tab-label">设置</span></div>
  </div>
</div>

<!-- WIZARD MODAL -->
<div id="wizard-modal" class="modal-overlay" style="display:none" onclick="wzBgClick(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="wizard-steps" id="wz-steps"></div>
    <div id="wz-body"></div>
  </div>
</div>

<!-- GAME SETTINGS MODAL -->
<div id="gset-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeGset()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">游戏设置</div>
    <div class="modal-tabs">
      <div class="mtab active" data-gt="style" onclick="switchGsetTab('style')">风格</div>
      <div class="mtab" data-gt="story" onclick="switchGsetTab('story')">设定</div>
      <div class="mtab" data-gt="chars" onclick="switchGsetTab('chars')">角色</div>
    </div>
    <div id="gset-body"></div>
  </div>
</div>

<!-- FRAG GEN MODAL -->
<div id="frag-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeFgModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">生成碎片</div>
    <div class="modal-body" style="padding-top:16px">
      <div class="form-group">
        <label class="form-label">选择角色</label>
        <div class="npc-sel-grid" id="fg-npc-sel"></div>
      </div>
      <div class="form-group">
        <label class="form-label">碎片类型</label>
        <div class="frag-type-grid">
          <div class="frag-type-btn active" data-type="diary"      onclick="selFgType('diary')">📔 角色日记</div>
          <div class="frag-type-btn"        data-type="weibo"      onclick="selFgType('weibo')">📱 朋友圈</div>
          <div class="frag-type-btn"        data-type="forum"      onclick="selFgType('forum')">💬 论坛帖</div>
          <div class="frag-type-btn"        data-type="memory"     onclick="selFgType('memory')">✦ 记忆碎片</div>
          <div class="frag-type-btn"        data-type="gossip"     onclick="selFgType('gossip')">🗣 NPC八卦</div>
          <div class="frag-type-btn"        data-type="their_view" onclick="selFgType('their_view')">👁 TA眼中的我</div>
        </div>
      </div>
      <div class="wizard-nav">
        <div class="btn-secondary" onclick="closeFgModal()">取消</div>
        <div class="btn-primary" onclick="generateFragment()">生成</div>
      </div>
    </div>
  </div>
</div>

<!-- DICE -->
<div id="check-overlay" class="check-overlay" style="display:none">
  <div class="dice-wrap">
    <div class="dice">🎲</div>
    <div class="check-info">
      <div class="ci-stat" id="ci-stat">—</div>
      <div class="ci-score" id="ci-score">—</div>
      <div class="ci-vs" id="ci-vs">—</div>
      <div class="ci-verdict" id="ci-verdict">—</div>
    </div>
  </div>
</div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="fi-world-wz"  accept=".txt,.md" style="display:none" onchange="handleWorldFileWz(event)">
<input type="file" id="fi-world-gs"  accept=".txt,.md" style="display:none" onchange="handleWorldFileGs(event)">
<input type="file" id="fi-npc"       accept=".txt,.md" style="display:none" onchange="handleNpcFile(event)">

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const SK = 'moyu_v2';
const MODELS = {
  deepseek:['deepseek-chat','deepseek-reasoner'],
  claude:  ['claude-sonnet-4-6','claude-opus-4-6'],
  openai:  ['gpt-4o','gpt-4.1','gpt-4o-mini'],
  gemini:  ['gemini-2.0-flash','gemini-1.5-pro']
};
const KEY_HINTS = {
  deepseek:'从 platform.deepseek.com 获取',
  claude:  '从 console.anthropic.com 获取',
  openai:  '从 platform.openai.com 获取',
  gemini:  '从 aistudio.google.com 获取'
};
const FRAG_LABELS = {
  diary:'📔 日记', weibo:'📱 朋友圈', forum:'💬 论坛帖',
  memory:'✦ 记忆碎片', gossip:'🗣 八卦', their_view:'👁 TA眼中的我'
};
const EMOJIS = ['🎭','⚔️','🌸','🐉','🌙','🏮','🗡️','💫','🌊','🔮','🎪','🏔️'];
const DEF_STYLE = {tone:'细腻抒情',realism:3,adultContent:'暗示',danmaku:false,romanceRatio:3,pace:3,romanceDetail:3};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let S = {
  currentId: null,
  settings: {
    provider:'deepseek',
    keys:{deepseek:'',claude:'',openai:'',gemini:''},
    models:{deepseek:'deepseek-chat',claude:'claude-sonnet-4-6',openai:'gpt-4o',gemini:'gemini-2.0-flash'}
  },
  games: {}
};

function load(){ try{ const d=localStorage.getItem(SK); if(d) S={...S,...JSON.parse(d)}; }catch(e){} }
function save(){ try{ localStorage.setItem(SK,JSON.stringify(S)); }catch(e){} }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function ago(ts){ const d=Date.now()-new Date(ts).getTime(); if(d<60000)return'刚刚'; if(d<3600000)return~~(d/60000)+'分钟前'; if(d<86400000)return~~(d/3600000)+'小时前'; return ~~(d/86400000)+'天前'; }
function cg()  { return S.currentId?S.games[S.currentId]:null; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════
//  PWA
// ═══════════════════════════════════════════════
(function(){
  const m={name:'墨游',short_name:'墨游',start_url:'./',display:'standalone',
    background_color:'#0e0e12',theme_color:'#0e0e12',
    icons:[{src:'logo.png',sizes:'192x192',type:'image/png'},{src:'logo.png',sizes:'512x512',type:'image/png'}]};
  try{ document.getElementById('pwa-manifest').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'})); }catch(e){}
})();

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  if(tab==='history')  renderHistory();
  if(tab==='character')renderCharacter();
  if(tab==='fragment') renderFragments();
  if(tab==='settings') renderSettings();
  if(tab==='game')     setTimeout(scrollBottom,80);
}

// ═══════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════
function renderHistory(){
  const games=Object.values(S.games).sort((a,b)=>new Date(b.lastPlayedAt)-new Date(a.lastPlayedAt));
  document.getElementById('hist-sub').textContent=games.length+' 个故事';
  const el=document.getElementById('game-list');
  if(!games.length){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">✦</div>还没有故事<br>开始第一个吧</div>`; return; }
  el.innerHTML=games.map(g=>`
    <div class="game-card">
      <div class="game-card-body" onclick="loadGame('${g.id}')">
        <div class="game-emoji">${g.emoji||'🎭'}</div>
        <div class="game-info">
          <div class="game-name">${esc(g.name)}${g.completed?'<span style="font-size:11px;color:var(--text3)"> · 完结</span>':''}</div>
          <div class="game-meta">${ago(g.lastPlayedAt)} · ${esc(g.chapter)}</div>
          <div class="game-tags">${(g.npcs||[]).slice(0,3).map(n=>`<span class="game-tag">${esc(n.name)}</span>`).join('')}</div>
        </div>
      </div>
      <div class="game-del-btn" onclick="deleteGame('${g.id}')">🗑</div>
    </div>`).join('');
}

function loadGame(id){
  S.currentId=id; S.games[id].lastPlayedAt=new Date().toISOString();
  save(); switchTab('game'); renderGamePage();
}

function deleteGame(id){
  const g=S.games[id]; if(!g) return;
  if(!confirm(`删除「${g.name}」？此操作不可撤销。`)) return;
  delete S.games[id]; if(S.currentId===id) S.currentId=null;
  save(); renderHistory();
}

// ═══════════════════════════════════════════════
//  GAME PAGE
// ═══════════════════════════════════════════════
function renderGamePage(){
  const g=cg(); if(!g) return;
  document.getElementById('game-world-name').textContent=g.name;
  document.getElementById('game-chapter').textContent=g.chapter;
  if(!g.narrativeHistory||!g.narrativeHistory.length){
    document.getElementById('narrative-area').innerHTML=`<div class="empty-state"><div class="empty-icon">📖</div>正在生成开场……</div>`;
    renderOptions([]); startGame(); return;
  }
  renderNarrativeHistory(); renderOptions(g._opts||[]);
}

function renderNarrativeHistory(){
  const g=cg(); if(!g) return;
  const area=document.getElementById('narrative-area');
  area.innerHTML=(g.narrativeHistory||[]).map(b=>{
    if(b.type==='narrative') return`<div class="narrative-block"><div class="narrative-text">${esc(b.content).replace(/\n/g,'<br>')}</div></div>`;
    if(b.type==='action')    return`<div class="narrative-block"><div class="narrative-action">「${esc(b.content)}」</div></div>`;
    if(b.type==='check')     return`<div class="narrative-block"><div class="check-result ${b.success?'success':'fail'}">
      <div class="check-label ${b.success?'success':'fail'}">${b.success?'✓ 判定成功':'✗ 判定失败'} · ${esc(b.stat)}(${b.score}) vs 难度${b.diff}</div>
      <div class="narrative-text" style="text-indent:0">${esc(b.content).replace(/\n/g,'<br>')}</div></div></div>`;
    if(b.type==='stat_log'){
      const chips=(b.changes||[]).map(c=>{
        const d=c.delta||''; const cls=d.startsWith('-')?'down':d.startsWith('+')?'up':(c.action==='已获得'?'tag-add':'tag-rm');
        return`<span class="stat-chip ${cls}">${esc(c.label)} ${esc(c.delta||c.action||'')}</span>`;
      }).join('');
      return chips?`<div class="narrative-block"><div class="stat-log">${chips}</div></div>`:'';
    }
    return'';
  }).join('');
  scrollBottom();
}

function scrollBottom(){ const a=document.getElementById('narrative-area'); if(a) a.scrollTop=a.scrollHeight; }
function renderOptions(opts){ document.getElementById('options-grid').innerHTML=(opts||[]).map((o,i)=>`<button class="option-btn" onclick="chooseOpt(${i})">${esc(o)}</button>`).join(''); }

function showLoading(){
  const d=document.createElement('div'); d.className='narrative-block'; d.id='ld-block';
  d.innerHTML=`<div class="loading-dots"><span></span><span></span><span></span></div>`;
  document.getElementById('narrative-area').appendChild(d); scrollBottom(); renderOptions([]);
}
function hideLoading(){ const e=document.getElementById('ld-block'); if(e)e.remove(); }

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
async function startGame(){
  const g=cg(); if(!g) return;
  showLoading();
  try{
    const sys=buildSys(g);
    const userMsg='请开始故事，生成引人入胜的开场白，介绍场景与初始情境，提供3个开局行动选项。';
    g.messages=[];
    const raw=await callAI(sys,[{role:'user',content:userMsg}]);
    const p=parseRes(raw);
    g.messages.push({role:'user',content:userMsg},{role:'assistant',content:raw});
    const logs=applyChanges(g,p.sc);
    g.narrativeHistory=[{type:'narrative',content:p.narrative}];
    if(logs.length) g.narrativeHistory.push({type:'stat_log',changes:logs});
    g._opts=p.options;
    hideLoading(); save(); renderNarrativeHistory(); renderOptions(p.options);
    document.getElementById('game-chapter').textContent=g.chapter;
  }catch(e){ hideLoading(); toast('API 错误: '+e.message); console.error(e); }
}

async function chooseOpt(i){ const g=cg(); if(!g||!g._opts) return; await doAction(g._opts[i]); }

async function sendFreeInput(){
  const inp=document.getElementById('free-input');
  const t=inp.value.trim(); if(!t) return;
  inp.value=''; inp.style.height='auto'; await doAction(t);
}

async function doAction(action){
  const g=cg(); if(!g) return;
  g.narrativeHistory.push({type:'action',content:action});
  renderNarrativeHistory(); showLoading();
  g.messages.push({role:'user',content:action});
  const sys=buildSys(g);
  try{
    const raw=await callAI(sys,g.messages);
    const p=parseRes(raw);
    g.messages.push({role:'assistant',content:raw});

    if(p.check){
      hideLoading();
      const cr=await doCheck(p.check,g);
      const followUp=`（属性检定结果：${p.check.required}综合得分${cr.score}，难度${p.check.difficulty}，${cr.success?'成功':'失败'}！）请据此描述${cr.success?'成功':'失败'}的结果，继续故事，给出新的3个选项。`;
      showLoading();
      g.messages.push({role:'user',content:followUp});
      const raw2=await callAI(sys,g.messages);
      const p2=parseRes(raw2);
      g.messages.push({role:'assistant',content:raw2});
      const logs2=applyChanges(g,p2.sc);
      hideLoading();
      g.narrativeHistory.push({type:'check',success:cr.success,stat:p.check.required,score:cr.score,diff:p.check.difficulty,content:p2.narrative});
      if(logs2.length) g.narrativeHistory.push({type:'stat_log',changes:logs2});
      g._opts=p2.options;
    } else {
      const logs=applyChanges(g,p.sc);
      hideLoading();
      g.narrativeHistory.push({type:'narrative',content:p.narrative});
      if(logs.length) g.narrativeHistory.push({type:'stat_log',changes:logs});
      g._opts=p.options;
    }

    g.lastPlayedAt=new Date().toISOString();
    document.getElementById('game-chapter').textContent=g.chapter;
    save(); renderNarrativeHistory(); renderOptions(g._opts||[]);
    compressMemoryIfNeeded(g); // 异步，不阻塞
  }catch(e){ hideLoading(); toast('AI 错误: '+e.message); console.error(e); }
}

// ═══════════════════════════════════════════════
//  ROLLING MEMORY COMPRESSION（异步，不阻塞游戏）
// ═══════════════════════════════════════════════
async function compressMemoryIfNeeded(game){
  if(game.messages.length < 22) return;
  const toCompress=game.messages.slice(0,16);
  game.messages=game.messages.slice(16);
  save();
  try{
    const prompt=`请将以下对话历史压缩为简洁剧情摘要（200字以内）。保留：关键事件、人物关系变化、重要决策及后果、属性变化节点。直接输出摘要文字，不加标题或格式。\n\n${toCompress.map(m=>(m.role==='user'?'玩家: ':'叙述: ')+m.content).join('\n')}`;
    const summary=await callAI('你是剧情摘要助手，直接输出简洁摘要。',[{role:'user',content:prompt}]);
    game.summaries=game.summaries||[];
    game.summaries.push({at:new Date().toISOString(),content:summary.trim()});
    save();
  }catch(e){
    // 压缩失败则还原
    game.messages=[...toCompress,...game.messages]; save();
  }
}

// ═══════════════════════════════════════════════
//  CHECK / DICE
// ═══════════════════════════════════════════════
function doCheck(check,game){
  return new Promise(resolve=>{
    const stat=game.player.stats[check.required]||50;
    const luck=game.player.stats['运气']||50;
    // 公式：属性×0.85（压低天花板） + 骰子1-20（大波动） + 幸运修正
    const roll=Math.ceil(Math.random()*20);
    const lBonus=Math.round((luck-50)*0.15);
    const score=Math.round(stat*0.85)+roll+lBonus;
    const ok=score>check.difficulty;

    document.getElementById('ci-stat').textContent=check.required+' 检定';
    const se=document.getElementById('ci-score'); se.textContent=score; se.className='ci-score '+(ok?'success':'fail');
    document.getElementById('ci-vs').textContent=`基础${Math.round(stat*0.85)} + 骰子${roll} ${lBonus>=0?'+':''}${lBonus}`;
    const ve=document.getElementById('ci-verdict'); ve.textContent=ok?'成　功':'失　败'; ve.className='ci-verdict '+(ok?'success':'fail');
    document.getElementById('check-overlay').style.display='flex';
    setTimeout(()=>{ document.getElementById('check-overlay').style.display='none'; resolve({success:ok,score}); },2300);
  });
}

// ═══════════════════════════════════════════════
//  APPLY CHANGES → returns log array
// ═══════════════════════════════════════════════
function applyChanges(game,sc){
  const logs=[];
  if(!sc) return logs;
  if(sc.player_stats) Object.entries(sc.player_stats).forEach(([k,v])=>{
    if(game.player.stats[k]!==undefined){
      const old=game.player.stats[k]; const nv=Math.min(100,Math.max(0,old+Number(v)));
      game.player.stats[k]=nv;
      if(Number(v)!==0) logs.push({label:'我·'+k, delta:(Number(v)>0?'+':'')+v, from:old, to:nv});
    }
  });
  if(sc.npc_affection) Object.entries(sc.npc_affection).forEach(([name,d])=>{
    const n=game.npcs.find(x=>x.name===name);
    if(n){ const old=n.affection||50; n.affection=Math.min(100,Math.max(0,old+Number(d)));
      if(Number(d)!==0) logs.push({label:name+'好感', delta:(Number(d)>0?'+':'')+d}); }
  });
  if(sc.npc_known_events) Object.entries(sc.npc_known_events).forEach(([name,evts])=>{
    const n=game.npcs.find(x=>x.name===name);
    if(n){ n.knownEvents=n.knownEvents||[]; evts.forEach(e=>{ if(!n.knownEvents.includes(e)) n.knownEvents.push(e); });
      if(n.knownEvents.length>20) n.knownEvents=n.knownEvents.slice(-20); }
  });
  if(sc.player_tags) sc.player_tags.forEach(tag=>{
    const t=tag.replace(/^[+\-]|\[|\]/g,'');
    if(tag.startsWith('+')&&!game.player.tags.includes(t)){ game.player.tags.push(t); logs.push({label:t,action:'已获得'}); }
    else if(tag.startsWith('-')&&game.player.tags.includes(t)){ game.player.tags=game.player.tags.filter(x=>x!==t); logs.push({label:t,action:'已移除'}); }
  });
  if(sc.chapter) game.chapter=sc.chapter;
  return logs;
}

function styleToText(st){
  if(!st) return '';
  const toneMap={细腻抒情:'文风细腻，注重内心描写与感官细节',轻喜剧:'基调轻松幽默，适当插入喜剧情节',严肃沉重:'叙述厚重有力，不回避冲突与后果',日常温馨:'基调温和日常，注重生活细节与人情味'};
  const paceMap={1:'叙述极慢，每个场景充分展开细写',2:'节奏偏慢',3:'节奏适中',4:'节奏较快',5:'节奏明快，压缩过渡直达关键'};
  const realMap={1:'情节戏剧化，巧合较多',2:'略偏戏剧',3:'现实与戏剧平衡',4:'写实为主，行动有真实后果',5:'高度写实，不劳而获几乎不可能，所有行动均有逻辑代价'};
  const rrMap={1:'极少感情线',2:'偶有感情戏',3:'感情线适量穿插',4:'感情线占较多篇幅',5:'感情线为核心主轴'};
  const rdMap={1:'感情场景点到为止',2:'略有描写',3:'适度细腻',4:'感情场景较为细腻',5:'感情场景极度细腻，注重内心与细节'};
  const adMap={回避:'所有亲密内容一律回避或跳过',暗示:'亲密内容以暗示手法处理，不明写',详写:'亲密场景可以详细描写'};
  return `\n【叙述风格指令】\n基调：${toneMap[st.tone]||st.tone}\n节奏：${paceMap[st.pace||3]}\n博弈写实度：${realMap[st.realism||3]}\n浪漫比重：${rrMap[st.romanceRatio||3]}\n浪漫细腻度：${rdMap[st.romanceDetail||3]}\n成人内容：${adMap[st.adultContent]||'暗示'}${st.danmaku?'\n弹幕模式：开启（每段叙述后附2-3条弹幕体评论，格式：【弹幕】内容）':''}`;
}

function buildSys(g){
  const summaryBlock=(g.summaries&&g.summaries.length)
    ?'\n【历史剧情摘要（请据此保持记忆连贯，不得遗忘）】\n'+g.summaries.map(s=>s.content).join('\n---\n'):'';
  const stats=Object.entries(g.player.stats||{}).map(([k,v])=>`${k}:${v}`).join('、');
  const tags=(g.player.tags||[]).join('、')||'无';
  const npcs=(g.npcs||[]).map(n=>`【${n.name}】${n.description||''}；好感度${n.affection||50}；已知事件：${(n.knownEvents||[]).join('、')||'无'}`).join('\n');
  return `你是沉浸式互动小说叙述者。

【世界观】
${g.worldSetting}
${summaryBlock}

【玩家角色】
姓名：${g.player.name}　背景：${g.player.background||'未设定'}
属性：${stats||'无'}　状态标签：${tags}

【NPC】
${npcs||'暂无'}
${styleToText(g.style||DEF_STYLE)}

【判定难度参考（AI设置difficulty时须遵守）】
≤30：极简单 | 35-50：普通挑战 | 55-70：有难度，需对应属性较高 | 75-85：极难，高属性也可能失败 | 90+：几乎不可能
重要：素人一步登顶、严重违背现实逻辑的事件难度应≥85。难度必须与世界观逻辑匹配。

【严禁规则】
1. 不得在叙述中代替玩家行动或决定，不得预设玩家的内心想法或情感
2. 选项必须是玩家「可以做」的事，而非「已经做了」的事
3. 每次只推进当前场景，不得用选项跳跃到远离当前场景的时间节点
4. 叙述结尾必须停在需要玩家决策的节点，不得自动推进太远
5. 3个选项之间须有明显差异（如行动、态度、方向不同）

【严格JSON格式回复，不输出任何其他内容】：
{"narrative":"叙述文字（中文，符合风格设定）","options":["选项1(≤14字)","选项2(≤14字)","选项3(≤14字)"],"check":null或{"required":"属性名","difficulty":整数},"state_changes":{"player_stats":{},"npc_affection":{},"npc_known_events":{},"player_tags":[],"chapter":null或"章节名"}}
state_changes数值为增量。player_tags格式："+[标签名]"或"-[标签名]"。`;
}

//  AI CALL
// ═══════════════════════════════════════════════
async function callAI(sys,msgs){
  const {provider,keys,models}=S.settings;
  const key=keys[provider]; if(!key) throw new Error('请先在设置中填写 API Key');
  const model=models[provider];
  if(provider==='deepseek'||provider==='openai') return callOAI(provider,key,model,sys,msgs);
  if(provider==='claude')  return callClaude(key,model,sys,msgs);
  if(provider==='gemini')  return callGemini(key,model,sys,msgs);
  throw new Error('未知服务商');
}

async function callOAI(prov,key,model,sys,msgs){
  const url=prov==='deepseek'?'https://api.deepseek.com/v1/chat/completions':'https://api.openai.com/v1/chat/completions';
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model,messages:[{role:'system',content:sys},...msgs],temperature:.85,max_tokens:1200,response_format:{type:'json_object'}})});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||'HTTP '+r.status); }
  return (await r.json()).choices[0].message.content;
}

async function callClaude(key,model,sys,msgs){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,system:sys,messages:msgs,max_tokens:1200,temperature:.85})});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||'HTTP '+r.status); }
  return (await r.json()).content[0].text;
}

async function callGemini(key,model,sys,msgs){
  const contents=msgs.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents,generationConfig:{temperature:.85,maxOutputTokens:1200,responseMimeType:'application/json'}})});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||'HTTP '+r.status); }
  return (await r.json()).candidates[0].content.parts[0].text;
}

function parseRes(raw){
  try{
    const p=JSON.parse(raw.replace(/```json\n?|```\n?/g,'').trim());
    return{narrative:p.narrative||'……',options:p.options||[],check:p.check||null,sc:p.state_changes||{}};
  }catch(e){ return{narrative:raw.slice(0,500),options:['继续……'],check:null,sc:{}}; }
}

async function generateFragment(){
  const g=cg(); if(!g) return;
  const npc=g.npcs.find(n=>n.id===fgState.npcId);
  if(['diary','weibo','memory','their_view'].includes(fgState.type)&&!npc){ toast('请选择角色'); return; }
  closeFgModal(); toast('生成中……');
  const recentNarr=(g.narrativeHistory||[]).filter(b=>b.type!=='stat_log').slice(-10).map(b=>b.content||'').join('\n');
  const sumCtx=(g.summaries&&g.summaries.length)?'历史摘要：'+g.summaries.slice(-2).map(s=>s.content).join(' / ')+'\n':'';
  const npcInfo=npc?`角色：${npc.name}，${npc.description}；好感度${npc.affection}；已知事件：${(npc.knownEvents||[]).join('、')||'无'}`:'路人视角';
  const TYPE_P={
    diary:`以${npc?.name}第一人称写当天日记，风格${npc?.diaryStyle||'真实内省'}，300字左右。`,
    weibo:`以${npc?.name}口吻写一条朋友圈，风格${npc?.weiboStyle||'简短意有所指'}，加2-3条其他角色的评论。格式：【正文】……\n💬角色名：……`,
    forum:`写一个论坛帖，路人讨论玩家${g.player.name}最近的行动，3-5楼，八卦视角，可有误解与猜测。`,
    memory:`写一段诗化「命运记忆碎片」，旁观视角，意象化语言描述某个关键瞬间，偏文学性，300字。`,
    gossip:`写一封在NPC间流传的八卦小纸条，关于玩家${g.player.name}，轻松八卦语气，200字左右。`,
    their_view:`以${npc?.name}的内心视角，写TA对玩家${g.player.name}的印象与评价，有主观滤镜，可有误解偏见，300字。`
  };
  const userContent=`${sumCtx}当前剧情：\n${recentNarr}\n\n${npcInfo}\n\n任务：${TYPE_P[fgState.type]}\n\n直接输出内容，不要JSON。`;
  try{
    const raw=await callAI(`你是互动小说辅助叙述者。世界观：${g.worldSetting}。直接输出内容，不加任何格式标记。`,[{role:'user',content:userContent}]);
    g.fragments=g.fragments||[];
    g.fragments.push({id:uid(),npcId:npc?.id||null,npcName:npc?.name||'路人',type:fgState.type,content:raw.replace(/```[\s\S]*?```/g,'').trim(),createdAt:new Date().toISOString(),chapterRef:g.chapter});
    save(); toast('碎片已生成'); switchTab('fragment');
  }catch(e){ toast('生成失败: '+e.message); }
}

function renderSettings(){
  const {provider,keys,models}=S.settings;
  document.querySelectorAll('.provider-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===provider));
  document.getElementById('api-key-input').value=keys[provider]||'';
  document.getElementById('key-hint').textContent=KEY_HINTS[provider]||'';
  const sel=document.getElementById('model-select');
  sel.innerHTML=(MODELS[provider]||[]).map(m=>`<option value="${m}" ${models[provider]===m?'selected':''}>${m}</option>`).join('');
}
function selectProvider(p){ S.settings.provider=p; save(); renderSettings(); }
function saveApiKey(){ S.settings.keys[S.settings.provider]=document.getElementById('api-key-input').value.trim(); save(); }
function saveModel(){ S.settings.models[S.settings.provider]=document.getElementById('model-select').value; save(); }

// ═══════════════════════════════════════════════
//  NEW GAME WIZARD
// ═══════════════════════════════════════════════
let wzStep=0, wzData={}, emojiIdx=0;
const WZ_TITLES=['世界观设定','玩家角色','登场人物'];

function openWizard(){
  wzStep=0;
  wzData={name:'',emoji:'🎭',worldSetting:'',
    player:{name:'',background:'',stats:[{name:'魅力',value:60},{name:'智谋',value:60},{name:'武力',value:50},{name:'运气',value:50}],tags:[]},
    npcs:[]};
  document.getElementById('wizard-modal').style.display='flex'; renderWz();
}
function wzBgClick(e){ if(e.target===document.getElementById('wizard-modal')) closeWz(); }
function closeWz(){ document.getElementById('wizard-modal').style.display='none'; }

function syncWz(){
  if(wzStep===0){
    const n=document.getElementById('wz-name'); if(n) wzData.name=n.value;
    const w=document.getElementById('wz-world'); if(w) wzData.worldSetting=w.value;
  }
  if(wzStep===1){
    const n=document.getElementById('wz-pname'); if(n) wzData.player.name=n.value;
    const b=document.getElementById('wz-pbg');   if(b) wzData.player.background=b.value;
    document.querySelectorAll('#wz-stats .stat-name-inp').forEach((el,i)=>{ if(wzData.player.stats[i]) wzData.player.stats[i].name=el.value; });
    document.querySelectorAll('#wz-stats .stat-val-inp').forEach((el,i)=>{ if(wzData.player.stats[i]) wzData.player.stats[i].value=+el.value||50; });
  }
}

function renderWz(){
  document.getElementById('wz-steps').innerHTML=WZ_TITLES.map((_,i)=>`<div class="wz-step ${i<=wzStep?'done':''}"></div>`).join('');
  const body=document.getElementById('wz-body');

  if(wzStep===0){
    body.innerHTML=`<div class="modal-title">${WZ_TITLES[0]}</div><div class="modal-body" style="padding-top:16px">
      <div class="form-group">
        <label class="form-label">故事名称</label>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="wz-name" placeholder="给这个故事起个名字" value="${esc(wzData.name)}" style="flex:1">
          <div class="form-input" id="wz-emoji" style="width:52px;text-align:center;font-size:22px;cursor:pointer;flex-shrink:0;padding:10px 0" onclick="pickEmoji()">${wzData.emoji}</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">世界观 / 背景设定</label>
        <textarea class="form-input form-textarea" id="wz-world" placeholder="描述故事的世界观、背景、规则……">${esc(wzData.worldSetting)}</textarea>
        <button class="import-btn" style="width:100%;margin-top:8px" onclick="document.getElementById('fi-world-wz').click()">📄 从文件导入（.txt / .md）</button>
        <div class="hint-text">导入后可继续手动补充修改</div>
      </div>
      <div class="wizard-nav"><div class="btn-secondary" onclick="closeWz()">取消</div><div class="btn-primary" onclick="wzNext()">下一步</div></div>
    </div>`;
  } else if(wzStep===1){
    body.innerHTML=`<div class="modal-title">${WZ_TITLES[1]}</div><div class="modal-body" style="padding-top:16px">
      <div class="form-group"><label class="form-label">姓名</label><input class="form-input" id="wz-pname" placeholder="你的角色名" value="${esc(wzData.player.name)}"></div>
      <div class="form-group"><label class="form-label">背景</label><input class="form-input" id="wz-pbg" placeholder="身份、来历、简介……" value="${esc(wzData.player.background)}"></div>
      <div class="form-group">
        <label class="form-label">属性</label>
        <div class="stats-builder" id="wz-stats">${wzData.player.stats.map((s,i)=>`<div class="stat-row">
          <input class="form-input stat-name-inp" placeholder="属性名" value="${esc(s.name)}" style="flex:1">
          <input class="form-input stat-val-inp" type="number" min="1" max="100" value="${s.value}" style="width:70px;text-align:center">
          <button class="rm-btn" onclick="wzRmStat(${i})">×</button></div>`).join('')}</div>
        <button class="add-btn" onclick="wzAddStat()">＋ 添加属性</button>
        <div class="hint-text">属性值 1-100，影响判定。建议保留「运气」。</div>
      </div>
      <div class="wizard-nav"><div class="btn-secondary" onclick="wzBack()">上一步</div><div class="btn-primary" onclick="wzNext()">下一步</div></div>
    </div>`;
  } else {
    const nh=wzData.npcs.map((n,i)=>`<div class="npc-item">
      <div class="npc-item-hdr"><span class="npc-item-name" id="npc-lbl-${i}">${esc(n.name)||'未命名'}</span><button class="rm-btn" onclick="wzRmNpc(${i})">×</button></div>
      <div class="form-group"><label class="form-label">姓名</label><input class="form-input" placeholder="角色名" value="${esc(n.name)}" oninput="wzUpdNpc(${i},'name',this.value)"></div>
      <div class="form-group"><label class="form-label">描述</label><input class="form-input" placeholder="身份、性格、与主角关系……" value="${esc(n.description)}" oninput="wzUpdNpc(${i},'description',this.value)"></div>
      <div class="form-group" style="margin-bottom:0"><label class="form-label">日记风格（可选）</label><input class="form-input" placeholder="例：克制、多用比喻" value="${esc(n.diaryStyle)}" oninput="wzUpdNpc(${i},'diaryStyle',this.value)"></div>
    </div>`).join('');
    body.innerHTML=`<div class="modal-title">${WZ_TITLES[2]}</div><div class="modal-body" style="padding-top:16px">
      <div class="hint-text" style="margin-bottom:12px">添加故事中的重要角色，之后也可在 ⚙ 中补充。</div>
      <div class="npc-builder" id="wz-npcs">${nh}</div>
      <button class="add-btn" onclick="wzAddNpc()">＋ 手动添加角色</button>
      <button class="import-btn" style="width:100%;margin-top:8px" onclick="document.getElementById('fi-npc').click()">📄 从文件导入角色（AI解析）</button>
      <div class="wizard-nav" style="margin-top:16px"><div class="btn-secondary" onclick="wzBack()">上一步</div><div class="btn-primary" onclick="createGame()">开始故事</div></div>
    </div>`;
  }
}

function wzNext(){
  syncWz();
  if(wzStep===0&&!wzData.name.trim()){ toast('请填写故事名称'); return; }
  if(wzStep===0&&!wzData.worldSetting.trim()){ toast('请填写世界观设定'); return; }
  if(wzStep===1&&!wzData.player.name.trim()){ toast('请填写角色名'); return; }
  wzStep++; renderWz();
}
function wzBack(){ syncWz(); wzStep--; renderWz(); }
function pickEmoji(){ emojiIdx=(emojiIdx+1)%EMOJIS.length; wzData.emoji=EMOJIS[emojiIdx]; const e=document.getElementById('wz-emoji'); if(e) e.textContent=wzData.emoji; }

function refreshStatsBuilder(){
  const cont=document.getElementById('wz-stats'); if(!cont) return;
  cont.innerHTML=wzData.player.stats.map((s,i)=>`<div class="stat-row">
    <input class="form-input stat-name-inp" placeholder="属性名" value="${esc(s.name)}" style="flex:1">
    <input class="form-input stat-val-inp" type="number" min="1" max="100" value="${s.value}" style="width:70px;text-align:center">
    <button class="rm-btn" onclick="wzRmStat(${i})">×</button></div>`).join('');
}
function wzAddStat(){ syncWz(); wzData.player.stats.push({name:'',value:50}); refreshStatsBuilder(); }
function wzRmStat(i){ syncWz(); wzData.player.stats.splice(i,1); refreshStatsBuilder(); }
function wzUpdNpc(i,k,v){ wzData.npcs[i][k]=v; const el=document.getElementById('npc-lbl-'+i); if(el&&k==='name') el.textContent=v||'未命名'; }
function wzAddNpc(){
  wzData.npcs.push({id:uid(),name:'',description:'',diaryStyle:'',weiboStyle:'',affection:50,knownEvents:[]});
  const nb=document.getElementById('wz-npcs'); if(!nb) return;
  const i=wzData.npcs.length-1;
  const d=document.createElement('div'); d.className='npc-item';
  d.innerHTML=`<div class="npc-item-hdr"><span class="npc-item-name" id="npc-lbl-${i}">未命名</span><button class="rm-btn" onclick="wzRmNpc(${i})">×</button></div>
    <div class="form-group"><label class="form-label">姓名</label><input class="form-input" placeholder="角色名" oninput="wzUpdNpc(${i},'name',this.value)"></div>
    <div class="form-group"><label class="form-label">描述</label><input class="form-input" placeholder="身份、性格……" oninput="wzUpdNpc(${i},'description',this.value)"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">日记风格</label><input class="form-input" placeholder="例：克制" oninput="wzUpdNpc(${i},'diaryStyle',this.value)"></div>`;
  nb.appendChild(d);
}
function wzRmNpc(i){ wzData.npcs.splice(i,1); renderWz(); }

// ═══════════════════════════════════════════════
//  FILE IMPORTS
// ═══════════════════════════════════════════════
function handleWorldFileWz(e){
  const f=e.target.files[0]; if(!f) return;
  new FileReader().onload=ev=>{ wzData.worldSetting=ev.target.result; const ta=document.getElementById('wz-world'); if(ta) ta.value=ev.target.result; toast('世界观已导入'); };
  (new FileReader()).readAsText(f,'utf-8'); e.target.value='';
  // fix: need to use single reader
  const r=new FileReader(); r.onload=ev=>{ wzData.worldSetting=ev.target.result; const ta=document.getElementById('wz-world'); if(ta) ta.value=ev.target.result; toast('世界观已导入'); }; r.readAsText(f,'utf-8'); e.target.value='';
}

function handleWorldFileGs(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>{ const g=cg(); if(g){ g.worldSetting=ev.target.result; save(); const ta=document.getElementById('gs-world'); if(ta) ta.value=ev.target.result; toast('世界观已导入'); } }; r.readAsText(f,'utf-8'); e.target.value='';
}

async function handleNpcFile(e){
  const f=e.target.files[0]; if(!f) return;
  toast('AI解析角色中……');
  const r=new FileReader();
  r.onload=async ev=>{
    const text=ev.target.result;
    try{
      const raw=await callAI(
        '你是角色解析助手。从文本中提取角色信息，严格以JSON数组输出，每个角色：{"name":"","description":"","diaryStyle":""}，不输出任何其他内容。',
        [{role:'user',content:'请从以下文本提取角色信息：\n\n'+text.slice(0,3000)}]
      );
      const arr=JSON.parse(raw.replace(/```json\n?|```\n?/g,'').trim());
      const newNpcs=arr.map(n=>({id:uid(),name:n.name||'',description:n.description||'',diaryStyle:n.diaryStyle||'',weiboStyle:'',affection:50,knownEvents:[]}));
      if(document.getElementById('wizard-modal').style.display!=='none'){
        wzData.npcs=[...wzData.npcs,...newNpcs]; renderWz();
      } else {
        const g=cg(); if(g){ g.npcs=[...g.npcs,...newNpcs]; save(); renderGsetBody(); }
      }
      toast(`已导入 ${newNpcs.length} 个角色`);
    }catch(err){ toast('解析失败，请检查文件内容'); console.error(err); }
  };
  r.readAsText(f,'utf-8'); e.target.value='';
}

function createGame(){
  syncWz();
  // Final sync of stat inputs
  document.querySelectorAll('#wz-stats .stat-name-inp').forEach((el,i)=>{ if(wzData.player.stats[i]) wzData.player.stats[i].name=el.value; });
  document.querySelectorAll('#wz-stats .stat-val-inp').forEach((el,i)=>{ if(wzData.player.stats[i]) wzData.player.stats[i].value=+el.value||50; });
  const statsObj={};
  wzData.player.stats.forEach(s=>{ if(s.name.trim()) statsObj[s.name.trim()]=Number(s.value)||50; });
  const game={
    id:uid(), name:wzData.name, emoji:wzData.emoji,
    createdAt:new Date().toISOString(), lastPlayedAt:new Date().toISOString(),
    completed:false, chapter:'序章', worldSetting:wzData.worldSetting,
    player:{name:wzData.player.name,background:wzData.player.background,stats:statsObj,tags:[]},
    npcs:wzData.npcs, messages:[], summaries:[], narrativeHistory:[], fragments:[], _opts:[],
    style:{...DEF_STYLE}
  };
  S.games[game.id]=game; S.currentId=game.id; save();
  closeWz(); switchTab('game'); renderGamePage();
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function toast(msg){
  const e=document.querySelector('.toast'); if(e) e.remove();
  const d=document.createElement('div'); d.className='toast'; d.textContent=msg;
  document.body.appendChild(d); setTimeout(()=>d.remove(),2600);
}

// ═══════════════════════════════════════════════
//  INPUT EVENTS
// ═══════════════════════════════════════════════
document.getElementById('free-input').addEventListener('input',function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px';
});
document.getElementById('free-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendFreeInput(); }
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
load();
renderHistory();
renderSettings();
</script>
